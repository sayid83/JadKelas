<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jadual Peribadi Sekolah Rendah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f4f8;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.25) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(236, 72, 153, 0.25) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(45, 212, 191, 0.25) 0, transparent 50%),
                radial-gradient(at 50% 100%, rgba(245, 158, 11, 0.15) 0, transparent 50%);
            background-attachment: fixed;
            margin: 0;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 80px rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* Kotak Glossy untuk Header */
        .glossy-header {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0 0 32px 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .day-btn {
            transition: all 0.2s ease;
            background-color: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.8);
            color: #64748b;
        }

        .active-tab {
            background-color: #2563eb !important;
            color: white !important;
            border-color: #2563eb !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .timeline-line::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(203, 213, 225, 0.5);
        }

        .timeline-dot {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 9px;
            height: 9px;
            background: #ffffff;
            border-radius: 50%;
            border: 2px solid #3b82f6;
            z-index: 10;
        }

        /* Kesan Glossy & Shining pada Card */
        .schedule-card {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-image: linear-gradient(rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
        }

        .schedule-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                rgba(255, 255, 255, 0.4), 
                rgba(255, 255, 255, 0.1), 
                transparent
            );
            transform: skewX(-25deg);
            animation: shine 8s infinite ease-in-out;
        }

        @keyframes shine {
            0% { left: -150%; }
            15% { left: 150%; }
            100% { left: 150%; }
        }
    </style>
    <link rel="icon" type="image/png" sizes="32x32" href="LOGO SEKOLAH.png">
    <link rel="icon" type="image/png" sizes="16x16" href="LOGO SEKOLAH.png">
</head>
<body>

    <div class="mobile-container">
        <!-- Header dengan Kotak Glossy -->
        <header class="glossy-header pt-8 pb-4">
            <div class="flex justify-between items-center mb-5 px-6">
                <div>
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">Jadual Peribadi</h1>
                    <p id="current-date" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-0.5">MEMUATKAN...</p>
                </div>
                <div class="h-10 w-10 bg-white rounded-2xl flex items-center justify-center text-blue-600 shadow-sm border border-white/50">
                    <i class="fas fa-calendar-day text-base"></i>
                </div>
            </div>

            <!-- Tab Hari -->
            <div class="flex gap-2 overflow-x-auto no-scrollbar px-6">
                <button onclick="selectDay('ISNIN')" id="tab-ISNIN" class="day-btn shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-bold uppercase tracking-wide">ISNIN</button>
                <button onclick="selectDay('SELASA')" id="tab-SELASA" class="day-btn shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-bold uppercase tracking-wide">SELASA</button>
                <button onclick="selectDay('RABU')" id="tab-RABU" class="day-btn shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-bold uppercase tracking-wide">RABU</button>
                <button onclick="selectDay('KHAMIS')" id="tab-KHAMIS" class="day-btn shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-bold uppercase tracking-wide">KHAMIS</button>
                <button onclick="selectDay('JUMAAT')" id="tab-JUMAAT" class="day-btn shrink-0 px-5 py-2.5 rounded-2xl text-[10px] font-bold uppercase tracking-wide">JUMAAT</button>
            </div>
        </header>

        <!-- Kandungan Utama -->
        <main class="flex-1 px-6 py-6">
            <div class="relative timeline-line space-y-2.5 pb-12" id="schedule-list">
                <!-- Data dimasukkan secara dinamik -->
            </div>
        </main>
    </div>

    <script>
        // Fungsi untuk menukar format 24 jam ke 12 jam (e.g. 13:10 -> 1:10 PM)
        function format12h(time24) {
            const [hours, minutes] = time24.split(':');
            let h = parseInt(hours);
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${minutes} ${ampm}`;
        }

        const freeCard = 'bg-gradient-to-br from-slate-200/60 via-slate-100/60 to-slate-200/60 text-slate-400 border-slate-200/50';
        
        const schedule = {
            'ISNIN': [
                { time: '13:10', sub: 'PERH', desc: 'Perhimpunan Sekolah', col: 'bg-gradient-to-br from-slate-950 to-slate-800 text-white' },
                { time: '13:40', sub: 'SN 3I', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '14:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '14:40', sub: 'SN 2E', desc: 'Sains Tahun 2', col: 'bg-gradient-to-br from-violet-600 to-purple-500 text-white' },
                { time: '15:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '15:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:10', sub: 'SN 2F', desc: 'Sains Tahun 2', col: 'bg-gradient-to-br from-violet-600 to-purple-500 text-white' },
                { time: '16:40', sub: 'SN 2F', desc: 'Sains Tahun 2', col: 'bg-gradient-to-br from-violet-600 to-purple-500 text-white' },
                { time: '17:10', sub: 'MT 3C', desc: 'Matematik Tahun 3', col: 'bg-gradient-to-br from-sky-500 to-cyan-400 text-white' },
                { time: '17:40', sub: 'MT 3C', desc: 'Matematik Tahun 3', col: 'bg-gradient-to-br from-sky-500 to-cyan-400 text-white' },
                { time: '18:10', sub: 'TAMAT', desc: 'Waktu Bersurai', col: 'bg-gradient-to-br from-emerald-600 to-teal-500 text-white' }
            ],
            'SELASA': [
                { time: '13:10', sub: 'SN 3D', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '13:40', sub: 'SN 3D', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '14:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '14:40', sub: 'SN 3G', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '15:10', sub: 'SN 3G', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '15:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:40', sub: 'MT 3C', desc: 'Matematik Tahun 3', col: 'bg-gradient-to-br from-sky-500 to-cyan-400 text-white' },
                { time: '17:10', sub: 'MT 3C', desc: 'Matematik Tahun 3', col: 'bg-gradient-to-br from-sky-500 to-cyan-400 text-white' },
                { time: '17:40', sub: 'SN 3B', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '18:10', sub: 'TAMAT', desc: 'Waktu Bersurai', col: 'bg-gradient-to-br from-emerald-600 to-teal-500 text-white' }
            ],
            'RABU': [
                { time: '13:10', sub: 'SN 3E', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '13:40', sub: 'SN 3E', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '14:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '14:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '15:10', sub: 'SN 3H', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '15:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:10', sub: 'SN 3H', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '16:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '17:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '17:40', sub: 'SN 3G', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '18:10', sub: 'TAMAT', desc: 'Waktu Bersurai', col: 'bg-gradient-to-br from-emerald-600 to-teal-500 text-white' }
            ],
            'KHAMIS': [
                { time: '13:10', sub: 'SN 2F', desc: 'Sains Tahun 2', col: 'bg-gradient-to-br from-violet-600 to-purple-500 text-white' },
                { time: '13:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '14:10', sub: 'SN 3H', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '14:40', sub: 'SN 3I', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '15:10', sub: 'SN 3I', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '15:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '17:10', sub: 'SN 2E', desc: 'Sains Tahun 2', col: 'bg-gradient-to-br from-violet-600 to-purple-500 text-white' },
                { time: '17:40', sub: 'SN 2E', desc: 'Sains Tahun 2', col: 'bg-gradient-to-br from-violet-600 to-purple-500 text-white' },
                { time: '18:10', sub: 'TAMAT', desc: 'Waktu Bersurai', col: 'bg-gradient-to-br from-emerald-600 to-teal-500 text-white' }
            ],
            'JUMAAT': [
                { time: '13:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '13:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '14:10', sub: 'SN 3D', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '14:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '15:10', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '15:40', sub: 'FREE', desc: 'Masa Lapang', col: freeCard },
                { time: '16:10', sub: 'SN 3B', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '16:40', sub: 'SN 3B', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '17:10', sub: 'SN 3E', desc: 'Sains Tahun 3', col: 'bg-gradient-to-br from-red-900 via-red-800 to-red-700 text-white' },
                { time: '17:40', sub: 'MT 3C', desc: 'Matematik Tahun 3', col: 'bg-gradient-to-br from-sky-500 to-cyan-400 text-white' },
                { time: '18:10', sub: 'TAMAT', desc: 'Waktu Bersurai', col: 'bg-gradient-to-br from-emerald-600 to-teal-500 text-white' }
            ]
        };

        function selectDay(day) {
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';

            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('active-tab'));
            const activeBtn = document.getElementById(`tab-${day}`);
            if (activeBtn) {
                activeBtn.classList.add('active-tab');
                activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            if (schedule[day]) {
                schedule[day].forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = "pl-11 relative animate-in fade-in slide-in-from-bottom-3 duration-400";
                    row.style.animationDelay = `${index * 60}ms`;
                    row.innerHTML = `
                        <div class="timeline-dot shadow-sm"></div>
                        <div class="mb-1">
                            <span class="text-[9px] font-black text-slate-500 flex items-center gap-1 uppercase tracking-tighter">
                                <i class="far fa-clock text-[8px]"></i> ${format12h(item.time)}
                            </span>
                        </div>
                        <div class="${item.col} schedule-card py-2 px-3 rounded-[20px] shadow-lg shadow-black/5 flex flex-col items-center justify-center text-center transition-all active:scale-[0.98]">
                            <h3 class="text-sm font-black leading-tight tracking-tight mb-0.5">${item.sub}</h3>
                            <p class="text-[9px] opacity-90 font-bold uppercase tracking-wider">${item.desc}</p>
                        </div>
                    `;
                    list.appendChild(row);
                });
            }
        }

        function init() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('ms-MY', options);

            const dayNames = ['AHAD', 'ISNIN', 'SELASA', 'RABU', 'KHAMIS', 'JUMAAT', 'SABTU'];
            const today = dayNames[now.getDay()];
            
            if (schedule[today]) {
                selectDay(today);
            } else {
                selectDay('ISNIN');
            }
        }

        window.onload = init;
    </script>
</body>
</html>
